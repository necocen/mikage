<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mikage example</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d14;
        }
        canvas {
            position: fixed;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <link data-trunk rel="rust" data-bin="mikage-wasm-demo" data-wasm-opt="z" />
    <script>
        window.addEventListener("load", () => {
            if (!navigator.gpu) {
                const msg = window.isSecureContext
                    ? "WebGPU is not supported in this browser"
                    : "WebGPU requires HTTPS (current context is not secure)";
                document.getElementById("loading").textContent = msg;
                return;
            }
            // Hide loading overlay once the canvas appears
            const observer = new MutationObserver(() => {
                if (document.querySelector("canvas")) {
                    const loading = document.getElementById("loading");
                    if (loading) loading.style.display = "none";
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });

            // Catch wasm panics and show them to the user
            window.addEventListener("error", (e) => {
                const loading = document.getElementById("loading");
                if (loading && loading.style.display !== "none") {
                    loading.textContent = "GPU initialization failed";
                }
            });
        });
    </script>
</body>
</html>
